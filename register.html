<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register | Smart Interview Portal</title>

    <link rel="stylesheet" href="register.css">

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <!-- Font Awesome -->
    <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <link rel="icon" type="image/x-icon" href="/image.png">
</head>

<body>

<div class="container">

    <!-- Left Side -->
    <div class="left">

        <h1>Join Smart Interview Portal</h1>

        <p>
            Create your account and start preparing for
            aptitude, coding and HR interviews.
        </p>

        <img src="reg.jpg">

    </div>

    <!-- Right Side -->
    <div class="right">

        <h2>Create Account</h2>

        <form id="registerForm">

            <div class="input-box">
                <i class="fas fa-user"></i>
                <input type="text" id="fullname" placeholder="Full Name" required>
            </div>

            <div class="input-box">
                <i class="fas fa-envelope"></i>
                <input type="email" id="email" placeholder="Email Address" required>
            </div>

            <div class="input-box">
                <i class="fas fa-phone"></i>
                <input type="tel" id="phone" placeholder="Mobile Number" required>
            </div>

            <div class="input-box">
                <i class="fas fa-lock"></i>
                <input type="password" id="password" placeholder="Password" required>
            </div>

            <div class="input-box">
                <i class="fas fa-lock"></i>
                <input type="password" id="confirmPassword" placeholder="Confirm Password" required>
            </div>

            <button>Create Account</button>

        </form>

        <p class="login">
            Already have an account?
            <a href="login.html">Login</a>
        </p>

    </div>
</div>
<script src="register.js"></script>
</body>
</html>
